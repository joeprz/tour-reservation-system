name: luciernas_control
description: Luciérnagas Control - Sistema de reservaciones para tour de luciérnagas en Nanacamilpa, Tlaxcala
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2
  url_launcher: ^6.3.0
  external_app_launcher: ^4.0.3
  android_intent_plus: ^5.3.0
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  screenshot: ^3.0.0
  # UI
  material_color_utilities: ^0.13.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  gap: ^3.0.1
  cached_network_image: ^3.3.1

  # Network / Sync
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^4.1.0

  # Utils
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  share_plus: ^7.2.2
  file_picker: ^10.3.3
  permission_handler: ^11.3.0
  local_auth: ^2.1.8

  # Export
  csv: ^5.1.1
  pdf: ^3.10.7

  # Notifications
  flutter_local_notifications: ^19.4.2
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
